<!-- app.component.html or sidebar.component.html -->

<nav class="nav-menu">
  <a
    class="nav-item"
    *ngFor="let item of navItems"
    [routerLink]="item.route"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
    (click)="setPageTitle(item.label)"
  >
    <i class="material-icons">{{ item.icon }}</i> {{ item.label }}
  </a>
</nav>

</aside>

  <!-- Main Content Area -->
  <div class="main-content">

    <!-- Header -->
  <header class="header">
  <h3 class="page-title">{{pageTitle}}</h3>

  <div class="header-icons">
    <ng-container *ngFor="let item of headerIcons">
      <!-- If it is a button -->
      <button *ngIf="item.isButton" [attr.aria-label]="item.ariaLabel">
        <i class="material-icons">{{ item.icon }}</i>
      </button>

      <!-- If it is an icon with optional badge -->
      <div *ngIf="!item.isButton" class="notification" [attr.aria-label]="item.ariaLabel">
        <i class="material-icons">{{ item.icon }}</i>
        <span *ngIf="item.badge" class="badge">{{ item.badge }}</span>
      </div>
    </ng-container>
  </div>
</header>


    <!-- Router outlet or main content -->
    <div class="content-body">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
